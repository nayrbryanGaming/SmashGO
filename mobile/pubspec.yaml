name: smashgo
description: Corporate Badminton Court Management Platform
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: any
  riverpod_annotation: any
  go_router: any
  supabase_flutter: any
  dio: any
  retrofit: any
  hive: any
  hive_flutter: any
  firebase_core: any
  firebase_messaging: any
  lucide_icons: any
  google_fonts: any
  flutter_svg: any
  cached_network_image: any
  shimmer: any
  qr_flutter: any
  mobile_scanner: any
  intl: any
  fpdart: any
  freezed_annotation: any
  json_annotation: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  build_runner: any
  riverpod_generator: any
  freezed: any
  json_serializable: any
  retrofit_generator: any
  hive_generator: any

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

