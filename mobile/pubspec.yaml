name: smashgo
description: Corporate Badminton Court Management Platform
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.7.2

  # Backend & Auth
  supabase_flutter: ^2.8.2

  # Network
  dio: ^5.8.0
  retrofit: ^4.1.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Push Notification
  firebase_core: ^3.11.0
  firebase_messaging: ^15.3.0

  # UI & Icons
  lucide_icons: ^0.320.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.4

  # Utils
  intl: ^0.19.0
  fpdart: ^0.6.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.4
  freezed: ^2.5.8
  json_serializable: ^6.9.3
  retrofit_generator: ^9.1.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
        - asset: assets/fonts/Outfit-Black.ttf
          weight: 900
